<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Kirish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 40px;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .logo i {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .login-header h1 { font-size: 2em; margin-bottom: 10px; }
        .login-header p { opacity: 0.95; font-size: 1.05em; }
        
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab {
            flex: 1;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab:hover { color: #667eea; }
        
        .login-body { padding: 35px 40px; }
        
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        
        .form-group { margin-bottom: 22px; }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .input-wrapper { position: relative; }
        
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.1em;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s;
            background: white;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .status {
            text-align: center;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 10px;
            display: none;
            font-size: 0.95em;
        }
        
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        
        .role-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #666;
            border-left: 4px solid #667eea;
        }
        
        .role-info i { color: #667eea; margin-right: 6px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1>EduTrack</h1>
            <p>Ta'lim Boshqaruv Tizimi</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">
                <i class="fas fa-sign-in-alt"></i> Kirish
            </div>
            <div class="tab" onclick="switchTab('register')">
                <i class="fas fa-user-plus"></i> Ro'yxatdan o'tish
            </div>
        </div>
        
        <div class="login-body">
            <!-- LOGIN PANEL -->
            <div id="loginPanel" class="form-panel active">
                <div id="loginStatus" class="status"></div>
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="email" id="loginEmail" placeholder="email@example.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Parol</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key"></i>
                            <input type="password" id="loginPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-sign-in-alt"></i> Kirish
                    </button>
                </form>
            </div>
            
            <!-- REGISTER PANEL -->
            <div id="registerPanel" class="form-panel">
                <div id="registerStatus" class="status"></div>
                <div class="role-info">
                    <i class="fas fa-info-circle"></i>
                    Rolni to'g'ri tanlang: O'quvchi, O'qituvchi yoki Ota-ona
                </div>
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Ism va Familiya</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="regName" placeholder="Ism Familiya" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-at"></i>
                            <input type="email" id="regEmail" placeholder="email@example.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Parol</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key"></i>
                            <input type="password" id="regPassword" placeholder="Kamida 6 ta belgi" required minlength="6">
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-users-cog"></i> Rol</label>
                        <div class="input-wrapper">
                            <i class="fas fa-tag"></i>
                            <select id="regRole" required>
                                <option value="">-- Rolni tanlang --</option>
                                <option value="student">O'quvchi</option>
                                <option value="teacher">O'qituvchi</option>
                                <option value="parent">Ota-ona</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-user-plus"></i> Ro'yxatdan o'tish
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // Simple local user storage (demo mode - no backend)
        function getUsers() {
            return JSON.parse(localStorage.getItem('edutrack_users') || '[]');
        }
        
        function saveUsers(users) {
            localStorage.setItem('edutrack_users', JSON.stringify(users));
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
        }
        
        function showStatus(id, type, message) {
            const el = document.getElementById(id);
            el.className = `status ${type}`;
            el.innerHTML = message;
            el.style.display = 'block';
        }
        
        function getDashboard(role) {
            const map = {
                student: 'dashboard.html', STUDENT: 'dashboard.html',
                teacher: 'teacher-dashboard.html', TEACHER: 'teacher-dashboard.html',
                parent: 'parent-dashboard.html', PARENT: 'parent-dashboard.html',
                admin: 'admin-dashboard.html', ADMIN: 'admin-dashboard.html'
            };
            return map[role] || 'dashboard.html';
        }
        
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            showStatus('loginStatus', 'info', '<i class="fas fa-spinner fa-spin"></i> Tekshirilmoqda...');
            
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(r => r.json().then(data => ({ ok: r.ok, data })))
            .then(({ ok, data }) => {
                if (ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    showStatus('loginStatus', 'success', `<i class="fas fa-check-circle"></i> Xush kelibsiz, ${data.user.firstName}!`);
                    setTimeout(() => { window.location.href = getDashboard(data.user.role); }, 1000);
                } else {
                    showStatus('loginStatus', 'error', `<i class="fas fa-exclamation-circle"></i> ${data.error}`);
                }
            })
            .catch(() => {
                // Demo mode fallback
                const users = getUsers();
                const user = users.find(u => u.email === email && u.password === password);
                if (user) {
                    showStatus('loginStatus', 'success', `<i class="fas fa-check-circle"></i> Xush kelibsiz, ${user.name}!`);
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    setTimeout(() => { window.location.href = getDashboard(user.role); }, 1000);
                } else {
                    showStatus('loginStatus', 'error', '<i class="fas fa-exclamation-circle"></i> Email yoki parol noto\'g\'ri');
                }
            });
        }
        
        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            
            if (!name || !email || !password || !role) {
                showStatus('registerStatus', 'error', '<i class="fas fa-exclamation-circle"></i> Barcha maydonlarni to\'ldiring');
                return;
            }
            
            const [firstName, ...rest] = name.split(' ');
            const lastName = rest.join(' ') || '-';
            
            showStatus('registerStatus', 'info', '<i class="fas fa-spinner fa-spin"></i> Ro\'yxatdan o\'tilmoqda...');
            
            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, firstName, lastName, role: role.toUpperCase() })
            })
            .then(r => r.json().then(data => ({ ok: r.ok, data })))
            .then(({ ok, data }) => {
                if (ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    showStatus('registerStatus', 'success', '<i class="fas fa-check-circle"></i> Muvaffaqiyatli! Yo\'naltirilmoqda...');
                    setTimeout(() => { window.location.href = getDashboard(data.user.role); }, 1200);
                } else {
                    showStatus('registerStatus', 'error', `<i class="fas fa-exclamation-circle"></i> ${data.error}`);
                }
            })
            .catch(() => {
                // Demo mode fallback
                const users = getUsers();
                if (users.find(u => u.email === email)) {
                    showStatus('registerStatus', 'error', '<i class="fas fa-exclamation-circle"></i> Bu email allaqachon ro\'yxatdan o\'tgan');
                    return;
                }
                const newUser = { id: Date.now(), name, email, password, role: role.toLowerCase(), createdAt: new Date().toISOString() };
                users.push(newUser);
                saveUsers(users);
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                showStatus('registerStatus', 'success', '<i class="fas fa-check-circle"></i> Muvaffaqiyatli ro\'yxatdan o\'tdingiz!');
                setTimeout(() => { window.location.href = getDashboard(role); }, 1200);
            });
        }
    </script>
</body>
</html>
