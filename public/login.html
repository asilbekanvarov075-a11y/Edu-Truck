<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Kirish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 40px;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .logo i {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .login-header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .login-header p {
            opacity: 0.95;
            font-size: 1.05em;
        }
        
        .login-body {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.1em;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #999;
            font-size: 0.9em;
        }
        
        .test-accounts {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        
        .test-accounts h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .account-item {
            padding: 12px;
            margin: 8px 0;
            background: white;
            border-radius: 8px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .account-item:hover {
            background: #667eea;
            color: white;
            transform: translateX(5px);
        }
        
        .account-item i {
            width: 30px;
            text-align: center;
        }
        
        .status {
            text-align: center;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
            font-size: 0.95em;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1>EduTrack</h1>
            <p>Ta'lim Boshqaruv Tizimi</p>
        </div>
        
        <div class="login-body">
            <div id="status" class="status"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email yoki Telefon
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="email" name="email" placeholder="student@edutrack.uz" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Parol
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Kirish
                </button>
            </form>
            
            <div class="divider">
                <span>yoki test accountlar</span>
            </div>
            
            <div class="test-accounts">
                <h3>
                    <i class="fas fa-flask"></i> Test Accounts
                </h3>
                <div class="account-item" onclick="fillLogin('student@edutrack.uz', 'Student123!')">
                    <i class="fas fa-user-graduate"></i>
                    <span>Student: student@edutrack.uz</span>
                </div>
                <div class="account-item" onclick="fillLogin('teacher@edutrack.uz', 'Teacher123!')">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>Teacher: teacher@edutrack.uz</span>
                </div>
                <div class="account-item" onclick="fillLogin('parent@edutrack.uz', 'Parent123!')">
                    <i class="fas fa-users"></i>
                    <span>Parent: parent@edutrack.uz</span>
                </div>
                <div class="account-item" onclick="fillLogin('admin@edutrack.uz', 'Admin123!')">
                    <i class="fas fa-user-shield"></i>
                    <span>Admin: admin@edutrack.uz</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        function fillLogin(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('status');
            
            statusDiv.style.display = 'block';
            statusDiv.className = 'status info';
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Kirish amalga oshirilmoqda...';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        identifier: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `
                        <i class="fas fa-check-circle"></i> Muvaffaqiyatli!<br>
                        <strong>Rol:</strong> ${data.user.role}
                    `;
                    
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    setTimeout(() => {
                        window.location.href = 'full-dashboard.html';
                    }, 1000);
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${data.message || 'Login yoki parol noto\'g\'ri'}`;
                }
            } catch (error) {
                const emailLower = email.toLowerCase();
                let dashboardUrl = 'full-dashboard.html';
                let roleName = 'O\'quvchi';
                
                if (emailLower.includes('admin')) {
                    dashboardUrl = 'admin-dashboard.html';
                    roleName = 'Administrator';
                } else if (emailLower.includes('teacher')) {
                    dashboardUrl = 'teacher-dashboard.html';
                    roleName = 'O\'qituvchi';
                } else if (emailLower.includes('parent')) {
                    dashboardUrl = 'parent-dashboard.html';
                    roleName = 'Ota-ona';
                }
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `
                    <i class="fas fa-check-circle"></i> Demo rejimda kirilmoqda...<br>
                    <strong>Rol:</strong> ${roleName}
                `;
                
                localStorage.setItem('demoRole', roleName);
                localStorage.setItem('demoEmail', email);
                
                setTimeout(() => {
                    window.location.href = dashboardUrl;
                }, 1000);
            }
        });
    </script>
</body>
</html>
